<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ===== Page layout ===== */
    .projects-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 1000px;
    }

    /* ===== Project Card ===== */
    .project-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .card-header {
      padding: 16px 20px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--border-muted);
    }

    .card-header-left {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .status-dot.clean    { background: #3fb950; box-shadow: 0 0 6px #3fb95066; }
    .status-dot.unpushed { background: #d29922; box-shadow: 0 0 6px #d2992266; }
    .status-dot.dirty    { background: #f85149; box-shadow: 0 0 6px #f8514966; }
    .status-dot.error    { background: #8b949e; }

    .card-header-info {
      min-width: 0;
    }

    .project-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      line-height: 1.4;
    }

    .review-btn {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      padding: 4px 12px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      transition: background 0.1s, color 0.1s;
    }

    .review-btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* Card section dividers */
    .card-section {
      border-bottom: 1px solid var(--border-muted);
      padding: 12px 20px;
    }

    .card-section:last-of-type {
      border-bottom: none;
    }

    .card-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-subtle);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ===== Section 1: Recent Commits (in card) ===== */
    .card-commit-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .card-commit-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 12px;
      line-height: 1.4;
      min-width: 0;
    }

    .card-commit-hash {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      color: var(--text-subtle);
      flex-shrink: 0;
    }

    .card-commit-msg {
      flex: 1;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .card-commit-author {
      font-size: 10px;
      color: var(--text-subtle);
      flex-shrink: 0;
    }

    .card-commit-time {
      font-size: 10px;
      color: var(--text-subtle);
      flex-shrink: 0;
    }

    .card-commit-badges {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .cbadge {
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
    }

    .cbadge.agent    { background: #bc8cff22; color: #bc8cff; border: 1px solid #bc8cff44; }
    .cbadge.external { background: #8b949e22; color: #8b949e; border: 1px solid #8b949e33; }
    .cbadge.unpushed { background: #d2992222; color: #d29922; border: 1px solid #d2992244; }
    .cbadge.pushed   { background: #3fb95022; color: #3fb950; border: 1px solid #3fb95044; }

    /* ===== Section 2: Local Changes ===== */
    .changes-row {
      margin-bottom: 8px;
    }

    .changes-row:last-child { margin-bottom: 0; }

    .changes-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .changes-commits {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .changes-commit {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: flex-start;
      gap: 5px;
      padding-left: 4px;
    }

    .changes-commit::before {
      content: '⬆';
      color: #d29922;
      font-size: 10px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .changes-files {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .change-file {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .change-file.M { background: #d2992222; color: #d29922; border: 1px solid #d2992244; }
    .change-file.A { background: #3fb95022; color: #3fb950; border: 1px solid #3fb95044; }
    .change-file.D { background: #f8514922; color: #f85149; border: 1px solid #f8514944; }
    .change-file.Q { background: #8b949e22; color: #8b949e; border: 1px solid #8b949e44; }
    .change-file.R { background: #bc8cff22; color: #bc8cff; border: 1px solid #bc8cff44; }

    /* ===== Section 3: Pending Tasks (in card) ===== */
    .pending-tasks-stats {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .card-tasks-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
    }

    .task-stat-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .task-stat-badge.todo       { background: #8b949e22; color: #8b949e; border: 1px solid #8b949e44; }
    .task-stat-badge.inprogress { background: #388bfd22; color: #388bfd; border: 1px solid #388bfd44; }
    .task-stat-badge.review     { background: #bc8cff22; color: #bc8cff; border: 1px solid #bc8cff44; }
    .task-stat-badge.done       { background: #3fb95022; color: #3fb950; border: 1px solid #3fb95044; }
    .task-stat-badge.blocked    { background: #f8514922; color: #f85149; border: 1px solid #f8514944; }

    .card-task-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 8px;
    }

    .card-task-row {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .task-priority-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-priority-dot.critical { background: #f85149; }
    .task-priority-dot.high     { background: #d29922; }
    .task-priority-dot.medium   { background: #388bfd; }
    .task-priority-dot.low      { background: #8b949e; }

    .card-task-title {
      font-size: 12px;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .task-status-badge.todo       { background: #8b949e22; color: #8b949e; border: 1px solid #8b949e44; }
    .task-status-badge.in_progress{ background: #388bfd22; color: #388bfd; border: 1px solid #388bfd44; }
    .task-status-badge.review     { background: #bc8cff22; color: #bc8cff; border: 1px solid #bc8cff44; }
    .task-status-badge.blocked    { background: #f8514922; color: #f85149; border: 1px solid #f8514944; }

    .card-task-assignee {
      font-size: 10px;
      color: var(--text-subtle);
      flex-shrink: 0;
    }

    .view-all-link {
      font-size: 11px;
      color: var(--accent);
      display: inline-block;
      margin-top: 4px;
      transition: color 0.1s;
    }

    .view-all-link:hover { color: var(--accent-hover); }

    /* ===== Card Footer ===== */
    .card-footer {
      padding: 10px 20px;
      background: var(--bg-card);
      border-top: 1px solid var(--border-muted);
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 11px;
      color: var(--text-subtle);
    }

    .card-footer-sep {
      color: var(--border);
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .card-header { flex-wrap: wrap; }
      .card-commit-author { display: none; }
      .commit-message { font-size: 12px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="logo">&#9670; <span>Dev</span>Dashboard</div>
    <div class="header-spacer"></div>
    <button class="btn-logout" id="logoutBtn">Sign out</button>
  </header>

  <div class="container">
    <h1 class="page-title">Projects</h1>
    <p class="page-subtitle">Select a project to review pending changes</p>

    <div id="content">
      <div class="loading"><div class="spinner"></div> Loading projects...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function requireAuth() {
      fetch('/api/session').then(r => r.json()).then(d => {
        if (!d.authenticated) window.location.href = '/login.html';
      });
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast toast-${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    function timeAgo(dateStr) {
      if (!dateStr) return 'unknown';
      const d = new Date(dateStr);
      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const PROJECT_COLORS = ['#388bfd', '#56d364', '#bc8cff', '#d29922', '#e06c75', '#4ec9b0', '#ce9178'];

    function projectBadgeStyle(color) {
      return `background:${color}22;color:${color};border:1px solid ${color}66;`;
    }

    const STATUS_LABELS = {
      todo: 'Todo', in_progress: 'In Progress', review: 'Review', done: 'Done', blocked: 'Blocked'
    };

    function taskStatusBadge(status) {
      const cls = status === 'in_progress' ? 'in_progress' : status;
      const label = STATUS_LABELS[status] || status;
      return `<span class="task-status-badge ${cls}">${escapeHtml(label)}</span>`;
    }

    // ===== Comprehensive Project Cards =====
    function renderProjectCards(projects, tasksByProject) {
      if (!projects.length) {
        return '<div class="empty-state"><div class="icon">&#128193;</div><h3>No projects configured</h3><p>Add projects to config.json</p></div>';
      }

      const cards = projects.map(p => {
        // Error state
        if (!p.accessible) {
          return `<div class="project-card">
            <div class="card-header">
              <div class="card-header-left">
                <span class="status-dot error"></span>
                <div class="card-header-info">
                  <div class="project-name">${escapeHtml(p.name)}</div>
                  <div class="project-desc">${escapeHtml(p.description || '')}</div>
                </div>
              </div>
              <a class="review-btn" href="/project.html?id=${escapeHtml(p.id)}">Review &#8594;</a>
            </div>
            <div class="card-section" style="color:var(--red);font-size:12px;opacity:0.8">
              &#10005; ${escapeHtml(p.error || 'Repository inaccessible')}
            </div>
            <div class="card-footer">
              <span>&#9135; ${escapeHtml(p.branch || 'unknown')}</span>
            </div>
          </div>`;
        }

        const pendingCount = p.pendingChanges || 0;
        const unpushedCount = p.unpushedCount || 0;

        // Status dot
        let dotClass = 'clean';
        if (pendingCount > 0) dotClass = 'dirty';
        else if (unpushedCount > 0) dotClass = 'unpushed';

        // --- Section 1: Recent Commits ---
        const recentCommits = (p.recentCommits || []).slice(0, 5);
        let section1 = '';
        if (recentCommits.length) {
          const unpushedHashes = new Set((p.unpushedCommits || []).map(c => c.hash));
          const rows = recentCommits.map(c => {
            const isUnpushed = unpushedHashes.has(c.hash);
            const srcBadge = c.source === 'agent'
              ? `<span class="cbadge agent">&#129302; Agent</span>`
              : `<span class="cbadge external">&#128100;</span>`;
            const upBadge = isUnpushed
              ? `<span class="cbadge unpushed">&#8679; Unpushed</span>`
              : `<span class="cbadge pushed">&#10003; Pushed</span>`;
            return `<div class="card-commit-row">
              <span class="card-commit-hash">${escapeHtml(c.shortHash || (c.hash || '').slice(0,7))}</span>
              <span class="card-commit-msg" title="${escapeHtml(c.message)}">${escapeHtml(c.message)}</span>
              <span class="card-commit-author">${escapeHtml(c.author)}</span>
              <span class="card-commit-time">${timeAgo(c.date)}</span>
              <span class="card-commit-badges">${srcBadge}${upBadge}</span>
            </div>`;
          }).join('');
          section1 = `<div class="card-section">
            <div class="card-section-title">&#9679; Recent Commits</div>
            <div class="card-commit-list">${rows}</div>
          </div>`;
        }

        // --- Section 2: Local Changes (only if present) ---
        let section2 = '';
        const uncommitted = p.uncommittedChanges || [];
        const unpushedCommits = p.unpushedCommits || [];
        if (uncommitted.length > 0 || unpushedCommits.length > 0) {
          let innerHtml = '';

          if (unpushedCommits.length > 0) {
            const commitItems = unpushedCommits.slice(0, 5).map(c =>
              `<div class="changes-commit">${escapeHtml(c.message)}</div>`
            ).join('');
            const more = unpushedCommits.length > 5
              ? `<div class="changes-commit" style="color:var(--text-subtle)">+${unpushedCommits.length - 5} more commits</div>`
              : '';
            innerHtml += `<div class="changes-row">
              <div class="changes-label">&#8679; <strong>${unpushedCommits.length}</strong> commit${unpushedCommits.length !== 1 ? 's' : ''} not pushed</div>
              <div class="changes-commits">${commitItems}${more}</div>
            </div>`;
          }

          if (uncommitted.length > 0) {
            const fileIcons = { M: '&#9998;', A: '+', D: '&#8722;', Q: '?', R: '&#8594;' };
            const fileBadges = uncommitted.slice(0, 20).map(f => {
              const sc = f.status === '?' ? 'Q' : (f.status || 'M');
              const icon = fileIcons[sc] || sc;
              const fname = f.file ? f.file.split('/').pop() : f.file;
              return `<span class="change-file ${sc}" title="${escapeHtml(f.file)}">${icon} ${escapeHtml(fname)}</span>`;
            }).join('');
            const moreFiles = uncommitted.length > 20
              ? `<span class="change-file Q">+${uncommitted.length - 20} more</span>`
              : '';
            innerHtml += `<div class="changes-row">
              <div class="changes-label">&#128221; <strong>${uncommitted.length}</strong> pending change${uncommitted.length !== 1 ? 's' : ''}</div>
              <div class="changes-files">${fileBadges}${moreFiles}</div>
            </div>`;
          }

          section2 = `<div class="card-section">${innerHtml}</div>`;
        }

        // --- Section 3: Pending Tasks ---
        let section3 = '';
        const tasks = tasksByProject[p.id] || [];
        const pendingTasks = tasks.filter(t => t.status !== 'done');
        if (pendingTasks.length > 0) {
          const counts = { todo: 0, in_progress: 0, review: 0, blocked: 0 };
          for (const t of pendingTasks) {
            if (counts[t.status] !== undefined) counts[t.status]++;
          }

          const statsParts = [
            counts.todo        ? `${counts.todo} Todo` : '',
            counts.in_progress ? `${counts.in_progress} In Progress` : '',
            counts.review      ? `${counts.review} Review` : '',
            counts.blocked     ? `${counts.blocked} Blocked` : '',
          ].filter(Boolean).join(' · ');

          const topTasks = pendingTasks
            .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))
            .slice(0, 5);

          const taskRows = topTasks.map(t => {
            const priority = t.priority || 'medium';
            return `<div class="card-task-row">
              <div class="task-priority-dot ${escapeHtml(priority)}"></div>
              <span class="card-task-title" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</span>
              ${taskStatusBadge(t.status)}
              ${t.assignee ? `<span class="card-task-assignee">&#128100; ${escapeHtml(t.assignee)}</span>` : ''}
            </div>`;
          }).join('');

          section3 = `<div class="card-section">
            <div class="card-section-title">&#128204; Pending Tasks</div>
            <div class="pending-tasks-stats">${escapeHtml(statsParts)}</div>
            <div class="card-task-list">${taskRows}</div>
            <a class="view-all-link" href="/project.html?id=${escapeHtml(p.id)}&tab=tasks">View all tasks &#8594;</a>
          </div>`;
        }

        // --- Footer ---
        const commitCount = (p.recentCommits || []).length;
        const footer = `<div class="card-footer">
          <span>&#9135; ${escapeHtml(p.branch || 'unknown')}</span>
          <span class="card-footer-sep">·</span>
          <span>${commitCount} recent commit${commitCount !== 1 ? 's' : ''}</span>
          <span class="card-footer-sep">·</span>
          <span>Last activity ${timeAgo(p.lastActivity)}</span>
        </div>`;

        return `<div class="project-card">
          <div class="card-header">
            <div class="card-header-left">
              <span class="status-dot ${dotClass}"></span>
              <div class="card-header-info">
                <div class="project-name">${escapeHtml(p.name)}</div>
                <div class="project-desc">${escapeHtml(p.description || '')}</div>
              </div>
            </div>
            <a class="review-btn" href="/project.html?id=${escapeHtml(p.id)}">Review &#8594;</a>
          </div>
          ${section1}
          ${section2}
          ${section3}
          ${footer}
        </div>`;
      });

      return `<div class="projects-list">${cards.join('')}</div>`;
    }

    async function loadProjects() {
      try {
        const res = await fetch('/api/projects');
        if (res.status === 401) { window.location.href = '/login.html'; return; }
        const projects = await res.json();

        const content = document.getElementById('content');

        if (!projects.length) {
          content.innerHTML = '<div class="empty-state"><div class="icon">&#128193;</div><h3>No projects configured</h3><p>Add projects to config.json</p></div>';
          return;
        }

        const colorMap = {};
        projects.forEach((p, i) => { colorMap[p.id] = PROJECT_COLORS[i % PROJECT_COLORS.length]; });

        // Fetch tasks for all projects in parallel
        const taskResults = await Promise.allSettled(
          projects.map(p => fetch(`/api/projects/${encodeURIComponent(p.id)}/tasks`).then(r => r.ok ? r.json() : []))
        );
        const tasksByProject = {};
        projects.forEach((p, i) => {
          tasksByProject[p.id] = taskResults[i].status === 'fulfilled' ? taskResults[i].value : [];
        });

        content.innerHTML = renderProjectCards(projects, tasksByProject);
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">&#10060;</div><h3>Failed to load projects</h3><p>${err.message}</p></div>`;
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    requireAuth();
    loadProjects();
  </script>
</body>
</html>
