<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ===== Project Cards (redesigned) ===== */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 768px) {
      .projects-grid { grid-template-columns: 1fr; }
    }

    .project-card {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      overflow: hidden;
    }

    .project-card-body {
      padding: 18px 20px 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .project-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .project-card-title {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .project-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .project-pending-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .pending-has-changes {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red);
    }

    .pending-clean {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green);
    }

    .pending-error {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red);
      opacity: 0.6;
    }

    .project-last-commit {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .last-commit-msg {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .last-commit-time {
      font-size: 11px;
      color: var(--text-subtle);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .project-card-footer {
      padding: 10px 20px;
      background: var(--bg-card);
      border-top: 1px solid var(--border-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .project-card-footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .project-branch {
      font-size: 11px;
      color: var(--text-subtle);
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .unpushed-indicator {
      font-size: 11px;
      color: var(--yellow);
      white-space: nowrap;
    }

    .review-btn {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: color 0.1s;
    }

    .project-card:hover .review-btn { color: var(--accent-hover); }

    /* ===== Activity Layout ===== */
    .activity-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 28px;
    }

    .activity-section {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .activity-section-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .activity-section-header .count-badge {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 11px;
      padding: 1px 7px;
      color: var(--text-subtle);
      font-weight: 500;
      margin-left: auto;
    }

    /* ===== Attention Section ===== */
    .attention-section {
      border-color: #e3b341aa;
    }

    .attention-section .activity-section-header {
      background: #2d200733;
      color: #e3b341;
      border-bottom-color: #e3b341aa;
    }

    .attention-group {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-muted);
    }

    .attention-group:last-child {
      border-bottom: none;
    }

    .attention-group-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .attention-project-row {
      margin-bottom: 10px;
    }

    .attention-project-row:last-child {
      margin-bottom: 0;
    }

    .attention-project-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .attention-files {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .attention-file {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .attention-file.status-M { background: #d2992222; color: #d29922; border: 1px solid #d2992244; }
    .attention-file.status-A { background: #3fb95022; color: #3fb950; border: 1px solid #3fb95044; }
    .attention-file.status-D { background: #f8514922; color: #f85149; border: 1px solid #f8514944; }
    .attention-file.status-Q { background: #8b949e22; color: #8b949e; border: 1px solid #8b949e44; }
    .attention-file.status-R { background: #bc8cff22; color: #bc8cff; border: 1px solid #bc8cff44; }

    .attention-commit-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .attention-commit {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .attention-commit::before {
      content: '↑';
      color: #d29922;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ===== Recent Commits Section ===== */
    .commit-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-muted);
      cursor: pointer;
      transition: background 0.1s;
    }

    .commit-item:last-child { border-bottom: none; }
    .commit-item:hover { background: var(--bg-hover); }

    .commit-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .commit-message {
      font-size: 13px;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .commit-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .commit-author {
      font-size: 11px;
      color: var(--text-subtle);
    }

    .commit-time {
      font-size: 11px;
      color: var(--text-subtle);
    }

    .commit-expand {
      display: none;
      padding: 10px 0 4px 0;
      border-top: 1px solid var(--border-muted);
      margin-top: 8px;
    }

    .commit-expand.open { display: block; }

    .commit-hash {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      color: var(--text-subtle);
      margin-bottom: 4px;
    }

    /* ===== Badges ===== */
    .badge-proj {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-source {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-source.agent { background: #bc8cff22; color: #bc8cff; border: 1px solid #bc8cff44; }
    .badge-source.external { background: #8b949e22; color: #8b949e; border: 1px solid #8b949e33; }

    .badge-push {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-push.pushed { background: #3fb95022; color: #3fb950; border: 1px solid #3fb95044; }
    .badge-push.unpushed { background: #d2992222; color: #d29922; border: 1px solid #d2992244; }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .commit-message { font-size: 12px; }
      .attention-files { gap: 3px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="logo">&#9670; <span>Dev</span>Dashboard</div>
    <div class="header-spacer"></div>
    <button class="btn-logout" id="logoutBtn">Sign out</button>
  </header>

  <div class="container">
    <h1 class="page-title">Projects</h1>
    <p class="page-subtitle">Select a project to review pending changes</p>

    <div id="content">
      <div class="loading"><div class="spinner"></div> Loading projects...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function requireAuth() {
      fetch('/api/session').then(r => r.json()).then(d => {
        if (!d.authenticated) window.location.href = '/login.html';
      });
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast toast-${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    function timeAgo(dateStr) {
      if (!dateStr) return 'unknown';
      const d = new Date(dateStr);
      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const PROJECT_COLORS = ['#388bfd', '#56d364', '#bc8cff', '#d29922', '#e06c75', '#4ec9b0', '#ce9178'];

    function projectBadgeStyle(color) {
      return `background:${color}22;color:${color};border:1px solid ${color}66;`;
    }

    // ===== Project Cards =====
    function renderProjectCards(projects) {
      if (!projects.length) {
        return '<div class="empty-state"><div class="icon">&#128193;</div><h3>No projects configured</h3><p>Add projects to config.json</p></div>';
      }

      const cards = projects.map(p => {
        if (!p.accessible) {
          return `<a class="project-card" href="/project.html?id=${escapeHtml(p.id)}">
            <div class="project-card-body">
              <div class="project-card-top">
                <div class="project-card-title">
                  <div class="project-name">${escapeHtml(p.name)}</div>
                  <div class="project-desc">${escapeHtml(p.description || '')}</div>
                </div>
                <span class="project-pending-badge pending-error">&#10005; Error</span>
              </div>
              <div class="last-commit-msg" style="color:var(--red);opacity:0.7">${escapeHtml(p.error || 'Repository inaccessible')}</div>
            </div>
            <div class="project-card-footer">
              <div class="project-card-footer-left"></div>
              <span class="review-btn">Review &#8594;</span>
            </div>
          </a>`;
        }

        const pendingCount = p.pendingChanges || 0;
        const unpushedCount = p.unpushedCount || 0;
        const lastCommit = (p.recentCommits && p.recentCommits[0]) || null;
        const lastMsg = lastCommit ? lastCommit.message : null;

        const pendingBadge = pendingCount > 0
          ? `<span class="project-pending-badge pending-has-changes">&#128221; ${pendingCount} pending</span>`
          : `<span class="project-pending-badge pending-clean">&#10003; Clean</span>`;

        const unpushedIndicator = unpushedCount > 0
          ? `<span class="unpushed-indicator">&#8679; ${unpushedCount} unpushed</span>`
          : '';

        const lastCommitHtml = lastMsg
          ? `<div class="project-last-commit">
              <span class="last-commit-msg" title="${escapeHtml(lastMsg)}">${escapeHtml(lastMsg)}</span>
              <span class="last-commit-time">${timeAgo(p.lastActivity)}</span>
            </div>`
          : `<div class="project-last-commit"><span class="last-commit-time">No commits yet</span></div>`;

        return `<a class="project-card" href="/project.html?id=${escapeHtml(p.id)}">
          <div class="project-card-body">
            <div class="project-card-top">
              <div class="project-card-title">
                <div class="project-name">${escapeHtml(p.name)}</div>
                <div class="project-desc">${escapeHtml(p.description || '')}</div>
              </div>
              ${pendingBadge}
            </div>
            ${lastCommitHtml}
          </div>
          <div class="project-card-footer">
            <div class="project-card-footer-left">
              <span class="project-branch">&#9135; ${escapeHtml(p.branch || 'unknown')}</span>
              ${unpushedIndicator}
            </div>
            <span class="review-btn">Review &#8594;</span>
          </div>
        </a>`;
      });

      return `<div class="projects-grid">${cards.join('')}</div>`;
    }

    // ===== Needs Attention =====
    function renderAttentionSection(projects, colorMap) {
      const uncommittedProjects = projects.filter(p => p.accessible && p.uncommittedChanges && p.uncommittedChanges.length > 0);
      const unpushedProjects = projects.filter(p => p.accessible && p.unpushedCommits && p.unpushedCommits.length > 0);

      if (!uncommittedProjects.length && !unpushedProjects.length) return '';

      let html = `<div class="activity-section attention-section">
        <div class="activity-section-header">
          &#9888; Needs Attention
          <span class="count-badge">${uncommittedProjects.length + unpushedProjects.length} project${uncommittedProjects.length + unpushedProjects.length !== 1 ? 's' : ''}</span>
        </div>`;

      if (uncommittedProjects.length) {
        html += `<div class="attention-group">
          <div class="attention-group-title">&#128221; Uncommitted Changes</div>`;
        for (const p of uncommittedProjects) {
          const color = colorMap[p.id];
          html += `<div class="attention-project-row">
            <div class="attention-project-name">
              <span class="badge-proj" style="${projectBadgeStyle(color)}">${escapeHtml(p.name)}</span>
              <span style="font-size:11px;color:var(--text-subtle)">${p.uncommittedChanges.length} file${p.uncommittedChanges.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="attention-files">`;
          for (const f of p.uncommittedChanges.slice(0, 20)) {
            const sc = f.status === '?' ? 'Q' : f.status;
            const icons = { M: '&#9998;', A: '&#43;', D: '&#8722;', Q: '?', R: '&#8594;' };
            html += `<span class="attention-file status-${sc}" title="${escapeHtml(f.file)}">${icons[sc] || sc} ${escapeHtml(f.file.split('/').pop())}</span>`;
          }
          if (p.uncommittedChanges.length > 20) {
            html += `<span class="attention-file status-Q">+${p.uncommittedChanges.length - 20} more</span>`;
          }
          html += `</div></div>`;
        }
        html += `</div>`;
      }

      if (unpushedProjects.length) {
        html += `<div class="attention-group">
          <div class="attention-group-title">&#8679; Unpushed Commits</div>`;
        for (const p of unpushedProjects) {
          const color = colorMap[p.id];
          html += `<div class="attention-project-row">
            <div class="attention-project-name">
              <span class="badge-proj" style="${projectBadgeStyle(color)}">${escapeHtml(p.name)}</span>
              <span style="font-size:11px;color:var(--text-subtle)">${p.unpushedCommits.length} commit${p.unpushedCommits.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="attention-commit-list">`;
          for (const c of p.unpushedCommits.slice(0, 5)) {
            html += `<div class="attention-commit"><span>${escapeHtml(c.message)}</span></div>`;
          }
          if (p.unpushedCommits.length > 5) {
            html += `<div class="attention-commit" style="color:var(--text-subtle)"><span>+${p.unpushedCommits.length - 5} more commits</span></div>`;
          }
          html += `</div></div>`;
        }
        html += `</div>`;
      }

      html += `</div>`;
      return html;
    }

    // ===== Recent Commits =====
    function renderRecentCommits(projects, colorMap) {
      const allCommits = projects
        .flatMap(p => (p.recentCommits || []))
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .slice(0, 15);

      if (!allCommits.length) return '';

      const items = allCommits.map((c, idx) => {
        const color = colorMap[c.projectId] || '#888';
        const sourceBadge = c.source === 'agent'
          ? `<span class="badge-source agent">&#129302; Agent</span>`
          : `<span class="badge-source external">&#128100; External</span>`;
        const pushBadge = c.pushed
          ? `<span class="badge-push pushed">&#10003; Pushed</span>`
          : `<span class="badge-push unpushed">&#8679; Unpushed</span>`;

        return `<div class="commit-item" onclick="handleCommitClick(event, ${idx}, '${escapeHtml(c.projectId)}')">
          <div class="commit-top">
            <span class="badge-proj" style="${projectBadgeStyle(color)}">${escapeHtml(c.projectName)}</span>
            <span class="commit-message" title="${escapeHtml(c.message)}">${escapeHtml(c.message)}</span>
            ${pushBadge}
          </div>
          <div class="commit-meta">
            <span class="commit-author">${escapeHtml(c.author)}</span>
            <span class="commit-time" style="color:var(--border)">·</span>
            <span class="commit-time">${timeAgo(c.date)}</span>
            ${sourceBadge}
          </div>
          <div class="commit-expand" id="commit-expand-${idx}">
            <div class="commit-hash">${escapeHtml(c.shortHash)} &mdash; <a href="/project.html?id=${escapeHtml(c.projectId)}" onclick="event.stopPropagation()">View project</a></div>
          </div>
        </div>`;
      });

      return `<div class="activity-section">
        <div class="activity-section-header">
          &#9679; Recent Commits
          <span class="count-badge">${allCommits.length}</span>
        </div>
        ${items.join('')}
      </div>`;
    }

    function handleCommitClick(event, idx, projectId) {
      // If clicking a link inside, let the link handle it
      if (event.target.tagName === 'A') return;
      const el = document.getElementById(`commit-expand-${idx}`);
      if (el) el.classList.toggle('open');
    }

    async function loadProjects() {
      try {
        const res = await fetch('/api/projects');
        if (res.status === 401) { window.location.href = '/login.html'; return; }
        const projects = await res.json();

        const content = document.getElementById('content');

        if (!projects.length) {
          content.innerHTML = '<div class="empty-state"><div class="icon">&#128193;</div><h3>No projects configured</h3><p>Add projects to config.json</p></div>';
          return;
        }

        const colorMap = {};
        projects.forEach((p, i) => { colorMap[p.id] = PROJECT_COLORS[i % PROJECT_COLORS.length]; });

        const activityWrapper = `<div class="activity-wrapper">
          ${renderAttentionSection(projects, colorMap)}
          ${renderRecentCommits(projects, colorMap)}
        </div>`;

        content.innerHTML = renderProjectCards(projects) + activityWrapper;
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">&#10060;</div><h3>Failed to load projects</h3><p>${err.message}</p></div>`;
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    requireAuth();
    loadProjects();
  </script>
</body>
</html>
