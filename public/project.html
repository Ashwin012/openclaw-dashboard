<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — Dev Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
</head>
<body>
  <header class="app-header">
    <div class="logo">&#9670; <span>Dev</span>Dashboard</div>
    <div class="header-spacer"></div>
    <a href="/home.html" class="btn-logout" style="text-decoration:none">&#127968; Home</a>
    <button class="btn-logout" id="logoutBtn">Sign out</button>
  </header>

  <div class="container">
    <div class="breadcrumb">
      <a href="/dashboard.html">&#8592; Projects</a>
    </div>

    <div id="content">
      <div class="loading"><div class="spinner"></div> Loading project...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="taskModal" style="display:none" onclick="if(event.target===this)closeTaskModal()">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalHeading">New Task</h3>
        <button class="modal-close-btn" onclick="closeTaskModal()">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="modal-form">
          <div class="mform-row">
            <label>Title <span style="color:var(--red)">*</span></label>
            <input type="text" id="taskTitle" placeholder="Task title...">
          </div>
          <div class="mform-row">
            <label>Description</label>
            <textarea id="taskDesc" placeholder="Describe the task..." rows="3"></textarea>
          </div>
          <div class="mform-row-inline">
            <div class="mform-col">
              <label>Priority</label>
              <select id="taskPriority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
            <div class="mform-col">
              <label>Status</label>
              <select id="taskStatus">
                <option value="todo" selected>Todo</option>
                <option value="in_progress">In Progress</option>
                <option value="review">Review</option>
                <option value="done">Done</option>
                <option value="blocked">Blocked</option>
              </select>
            </div>
            <div class="mform-col">
              <label>Assignee</label>
              <input type="text" id="taskAssignee" value="agent" placeholder="agent / human / name">
            </div>
          </div>
          <div class="mform-row">
            <label>Tags <span style="color:var(--text-subtle);font-weight:400">(comma-separated)</span></label>
            <input type="text" id="taskTags" placeholder="tests, stripe, backend">
          </div>
        </div>
        <div class="modal-notes" id="modalNotes" style="display:none">
          <h4>Notes</h4>
          <div class="notes-timeline" id="notesTimeline"></div>
          <div class="add-note-form">
            <input type="text" id="noteAuthor" placeholder="Your name..." value="admin" style="width:140px">
            <textarea id="noteText" placeholder="Add a note..." rows="2"></textarea>
            <button class="btn-submit" onclick="submitNote()">Add Note</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <div>
          <button class="btn btn-reject" id="deleteTaskBtn" onclick="deleteTask()" style="display:none">&#128465; Delete</button>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-cancel" onclick="closeTaskModal()">Cancel</button>
          <button class="btn-submit" id="saveTaskBtn" onclick="saveTask()">Create Task</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('id');
    let currentView = 'unified';
    let projectData = null;
    let activeTab = 'changes';
    let historyCache = null;
    let historyFilter = 'all';
    let unpushedCache = null;
    let tasksCache = null;
    let taskFilters = { status: '', priority: '', assignee: '', tags: '' };
    let draggedTaskId = null;
    let editingTaskId = null;
    let expandedTaskId = null;

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast toast-${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3500);
    }

    function getStatusClass(status) {
      if (status === 'M' || status === 'MM') return 'status-M';
      if (status === 'A' || status === '??') return 'status-A';
      if (status === 'D') return 'status-D';
      return 'status-?';
    }

    function getStatusLabel(status) {
      if (status.includes('M')) return 'M';
      if (status.includes('A') || status === '??') return 'A';
      if (status.includes('D')) return 'D';
      return '?';
    }

    function renderDiff(diff, view) {
      if (!diff || !diff.trim()) {
        return '<div class="empty-state" style="padding:32px"><div class="icon">&#10003;</div><h3>No changes to display</h3></div>';
      }
      try {
        const outputFormat = view === 'side-by-side' ? 'side-by-side' : 'line-by-line';
        const diffJson = Diff2Html.parse(diff);
        const html = Diff2Html.html(diffJson, {
          drawFileList: false,
          matching: 'lines',
          outputFormat,
          highlight: true,
          renderNothingWhenEmpty: false
        });
        return html;
      } catch (e) {
        return `<pre style="padding:16px;color:var(--text-muted);font-size:12px;overflow:auto">${escapeHtml(diff)}</pre>`;
      }
    }

    function formatDateTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
    }

    function actionLabel(action) {
      if (action === 'approved') return '<span class="hist-badge hist-approved">Approved</span>';
      if (action === 'rejected') return '<span class="hist-badge hist-rejected">Rejected</span>';
      if (action === 'instructed') return '<span class="hist-badge hist-instructed">Instructed</span>';
      return `<span class="hist-badge">${escapeHtml(action)}</span>`;
    }

    function toggleDiff(id, btn) {
      const el = document.getElementById(id);
      if (!el) return;
      const hidden = el.style.display === 'none';
      el.style.display = hidden ? 'block' : 'none';
      btn.innerHTML = hidden ? '&#128269; Hide diff' : '&#128269; Show diff';
    }

    function setHistoryFilter(filter) {
      historyFilter = filter;
      renderCommits();
    }

    function renderCommitCard(commit, index) {
      const isAgent = commit.source === 'agent';
      const badge = isAgent
        ? '<span class="source-badge source-agent">&#129302; Agent</span>'
        : '<span class="source-badge source-external">&#128100; External</span>';
      return `
        <div class="hist-entry">
          <div class="hist-entry-header">
            <div class="hist-meta">
              <code class="commit-hash" title="${escapeHtml(commit.hash)}">${escapeHtml(commit.shortHash)}</code>
              ${badge}
              <span class="hist-user">&#128100; ${escapeHtml(commit.author)}</span>
              <span class="hist-time">&#128336; ${timeAgo(commit.date)}</span>
            </div>
          </div>
          <div class="hist-message">${escapeHtml(commit.message)}</div>
          ${isAgent && commit.instruction ? `<div class="commit-instruction"><span class="instr-label">Instruction:</span> ${escapeHtml(commit.instruction)}</div>` : ''}
        </div>`;
    }

    function renderCommits() {
      const histPane = document.getElementById('historyPane');
      if (!histPane) return;
      const commits = historyCache || [];
      const filtered = historyFilter === 'all' ? commits : commits.filter(c => c.source === historyFilter);
      const agentCount = commits.filter(c => c.source === 'agent').length;
      const externalCount = commits.filter(c => c.source === 'external').length;

      const filterBar = `
        <div class="commits-filter-bar">
          <button class="filter-chip ${historyFilter === 'all' ? 'active' : ''}" onclick="setHistoryFilter('all')">All <span class="chip-count">${commits.length}</span></button>
          <button class="filter-chip ${historyFilter === 'agent' ? 'active' : ''}" onclick="setHistoryFilter('agent')">&#129302; Agent <span class="chip-count">${agentCount}</span></button>
          <button class="filter-chip ${historyFilter === 'external' ? 'active' : ''}" onclick="setHistoryFilter('external')">&#128100; External <span class="chip-count">${externalCount}</span></button>
        </div>`;

      if (!filtered.length) {
        histPane.innerHTML = filterBar + '<div class="empty-state" style="padding:48px"><div class="icon">&#128203;</div><h3>No commits found</h3><p>No commits match the current filter.</p></div>';
        return;
      }
      histPane.innerHTML = filterBar + `<div class="hist-list">${filtered.map((c, i) => renderCommitCard(c, i)).join('')}</div>`;
    }

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-changes').classList.toggle('active', tab === 'changes');
      document.getElementById('tab-unpushed').classList.toggle('active', tab === 'unpushed');
      document.getElementById('tab-history').classList.toggle('active', tab === 'history');
      document.getElementById('tab-tasks').classList.toggle('active', tab === 'tasks');
      document.getElementById('changesPane').style.display = tab === 'changes' ? '' : 'none';
      document.getElementById('unpushedPane').style.display = tab === 'unpushed' ? '' : 'none';
      document.getElementById('historyPane').style.display = tab === 'history' ? '' : 'none';
      document.getElementById('tasksPane').style.display = tab === 'tasks' ? '' : 'none';
      if (tab === 'history' && historyCache === null) loadHistory();
      if (tab === 'unpushed' && unpushedCache === null) loadUnpushed();
      if (tab === 'tasks') { if (tasksCache === null) loadTasks(); else renderKanban(); }
    }

    async function loadHistory() {
      const histPane = document.getElementById('historyPane');
      histPane.innerHTML = '<div class="loading"><div class="spinner"></div> Loading history...</div>';
      try {
        const res = await fetch(`/api/projects/${projectId}/commits`);
        if (!res.ok) throw new Error('Failed to load commits');
        historyCache = await res.json();
        renderCommits();
      } catch (err) {
        histPane.innerHTML = `<div class="empty-state"><div class="icon">&#10060;</div><h3>Failed to load history</h3><p>${escapeHtml(err.message)}</p></div>`;
      }
    }

    function renderUnpushedEntry(commit, index) {
      const shortHash = commit.hash ? commit.hash.substring(0, 7) : '?';
      const diffId = `unpushed-diff-${index}`;
      const hasDiff = commit.diff && commit.diff.trim();
      return `
        <div class="hist-entry">
          <div class="hist-entry-header">
            <div class="hist-meta">
              <code class="commit-hash">${escapeHtml(shortHash)}</code>
              <span class="hist-user">&#128100; ${escapeHtml(commit.author)}</span>
              <span class="hist-time">&#128336; ${formatDateTime(commit.date)}</span>
            </div>
            ${hasDiff ? `<button class="btn-toggle-diff" onclick="toggleDiff('${diffId}', this)">&#128269; Show diff</button>` : ''}
          </div>
          <div class="hist-message">${escapeHtml(commit.message)}</div>
          ${hasDiff ? `<div class="hist-diff-wrap" id="${diffId}" style="display:none">${renderDiff(commit.diff, 'unified')}</div>` : ''}
        </div>`;
    }

    async function loadUnpushed() {
      const pane = document.getElementById('unpushedPane');
      pane.innerHTML = '<div class="loading"><div class="spinner"></div> Loading unpushed commits...</div>';
      try {
        const res = await fetch(`/api/projects/${projectId}/unpushed`);
        if (!res.ok) throw new Error('Failed to load unpushed commits');
        unpushedCache = await res.json();
        if (!unpushedCache.length) {
          pane.innerHTML = '<div class="empty-state" style="padding:48px"><div class="icon">&#10003;</div><h3>All commits pushed</h3><p>Nothing waiting to be pushed to remote.</p></div>';
          return;
        }
        pane.innerHTML = `
          <div class="unpushed-actions">
            <span class="unpushed-count">${unpushedCache.length} commit${unpushedCache.length !== 1 ? 's' : ''} ahead of remote</span>
            <button class="btn btn-push" id="pushBtn" onclick="pushCommits()">&#8593; Push</button>
          </div>
          <div class="hist-list">${unpushedCache.map((c, i) => renderUnpushedEntry(c, i)).join('')}</div>`;
      } catch (err) {
        pane.innerHTML = `<div class="empty-state"><div class="icon">&#10060;</div><h3>Failed to load</h3><p>${escapeHtml(err.message)}</p></div>`;
      }
    }

    async function pushCommits() {
      const btn = document.getElementById('pushBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Pushing...'; }
      try {
        const res = await fetch(`/api/projects/${projectId}/push`, { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          showToast('Pushed successfully');
          unpushedCache = null;
          loadUnpushed();
        } else {
          showToast(data.error || 'Push failed', 'error');
          if (btn) { btn.disabled = false; btn.innerHTML = '&#8593; Push'; }
        }
      } catch (err) {
        showToast(err.message, 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = '&#8593; Push'; }
      }
    }

    function renderPage(data) {
      projectData = data;
      const hasChanges = data.files && data.files.length > 0;

      document.title = `${data.name} — Dev Dashboard`;

      const fileTree = data.files && data.files.length
        ? data.files.map(f => `
            <div class="file-tree-item" onclick="scrollToFile('${escapeHtml(f.path)}')">
              <span class="file-status ${getStatusClass(f.status)}">${getStatusLabel(f.status)}</span>
              <span>${escapeHtml(f.path)}</span>
            </div>`).join('')
        : '<div style="color:var(--text-subtle);font-size:12px;padding:4px">No changed files</div>';

      document.getElementById('content').innerHTML = `
        <div class="project-header">
          <div class="project-header-left">
            <h1>${escapeHtml(data.name)}</h1>
            <div class="desc">${escapeHtml(data.description)} &mdash; <code style="font-size:12px;color:var(--text-muted)">${escapeHtml(data.branch)}</code></div>
          </div>
          <span class="badge ${hasChanges ? 'badge-pending' : 'badge-clean'}">
            ${hasChanges ? `${data.files.length} file${data.files.length !== 1 ? 's' : ''} changed` : 'Clean'}
          </span>
        </div>

        <div class="tab-bar">
          <button class="tab-btn ${activeTab === 'changes' ? 'active' : ''}" id="tab-changes" onclick="switchTab('changes')">&#127381; Changes</button>
          <button class="tab-btn ${activeTab === 'unpushed' ? 'active' : ''}" id="tab-unpushed" onclick="switchTab('unpushed')">&#8593; Unpushed</button>
          <button class="tab-btn ${activeTab === 'history' ? 'active' : ''}" id="tab-history" onclick="switchTab('history')">&#128203; History</button>
          <button class="tab-btn ${activeTab === 'tasks' ? 'active' : ''}" id="tab-tasks" onclick="switchTab('tasks')">&#9776; Tasks <span class="tab-badge" id="tasksBadge" style="display:none"></span></button>
          <div style="flex:1"></div>
          <a class="tab-btn" href="/chat.html?id=${escapeHtml(data.id)}" style="text-decoration:none;color:inherit;background:var(--bg-hover);border:1px solid var(--border);padding:6px 14px;border-radius:var(--radius)">&#128172; Chat</a>
        </div>

        <div id="changesPane" style="${activeTab !== 'changes' ? 'display:none' : ''}">
          <div class="project-layout">
            <aside>
              <div class="file-tree">
                <h3>Changed Files</h3>
                ${fileTree}
              </div>
            </aside>

            <div class="diff-panel">
              ${hasChanges ? `
              <div class="actions-bar">
                <h3>Actions</h3>
                <div class="actions-row">
                  <button class="btn btn-approve" onclick="showCommitForm()">&#10003; Approve &amp; Commit</button>
                  <button class="btn btn-reject" onclick="rejectChanges()">&#10007; Reject Changes</button>
                  <button class="btn btn-instruct" onclick="showInstructForm()">&#9998; Instruct</button>
                </div>

                <div class="commit-form" id="commitForm">
                  <input type="text" id="commitMsg" placeholder="Commit message..." />
                  <div class="form-btns">
                    <button class="btn-submit" onclick="submitCommit()">Commit</button>
                    <button class="btn-cancel" onclick="hideCommitForm()">Cancel</button>
                  </div>
                </div>

                <div class="instruct-form" id="instructForm">
                  <textarea id="instructText" placeholder="Enter instructions for the agent..."></textarea>
                  <div class="form-btns">
                    <button class="btn-submit" onclick="submitInstruct()">Save Instruction</button>
                    <button class="btn-cancel" onclick="hideInstructForm()">Cancel</button>
                  </div>
                </div>
              </div>
              ` : ''}

              <div class="diff-container">
                <div class="diff-header">
                  <h3>Diff</h3>
                  <div class="view-toggle">
                    <button class="view-btn active" id="btnUnified" onclick="setView('unified')">Unified</button>
                    <button class="view-btn" id="btnSide" onclick="setView('side-by-side')">Side by side</button>
                  </div>
                </div>
                <div class="diff-body" id="diffBody">
                  ${renderDiff(data.diff, currentView)}
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="unpushedPane" style="${activeTab === 'unpushed' ? '' : 'display:none'}">
          <div class="loading"><div class="spinner"></div> Loading unpushed commits...</div>
        </div>

        <div id="historyPane" style="${activeTab === 'history' ? '' : 'display:none'}">
          <div class="loading"><div class="spinner"></div> Loading history...</div>
        </div>

        <div id="tasksPane" style="${activeTab === 'tasks' ? '' : 'display:none'}">
          <div class="tasks-toolbar">
            <div class="tasks-filters">
              <select id="filterStatus" onchange="applyTaskFilters()">
                <option value="">All Statuses</option>
                <option value="todo">Todo</option>
                <option value="in_progress">In Progress</option>
                <option value="review">Review</option>
                <option value="done">Done</option>
                <option value="blocked">Blocked</option>
              </select>
              <select id="filterPriority" onchange="applyTaskFilters()">
                <option value="">All Priorities</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
              <select id="filterAssignee" onchange="applyTaskFilters()">
                <option value="">All Assignees</option>
                <option value="agent">Agent</option>
                <option value="human">Human</option>
              </select>
              <input type="text" id="filterTags" placeholder="Filter by tag..." oninput="applyTaskFilters()" class="task-filter-input">
            </div>
            <button class="btn btn-new-task" onclick="showNewTaskModal()">+ New Task</button>
          </div>
          <div class="kanban-board" id="kanbanBoard">
            <div class="loading"><div class="spinner"></div> Loading tasks...</div>
          </div>
        </div>`;

      if (activeTab === 'history' && historyCache === null) loadHistory();
      if (activeTab === 'unpushed' && unpushedCache === null) loadUnpushed();
      if (activeTab === 'tasks') { if (tasksCache === null) loadTasks(); else { updateTasksBadge(); renderKanban(); } }
    }

    function setView(view) {
      currentView = view;
      document.getElementById('btnUnified').classList.toggle('active', view === 'unified');
      document.getElementById('btnSide').classList.toggle('active', view === 'side-by-side');
      if (projectData) {
        document.getElementById('diffBody').innerHTML = renderDiff(projectData.diff, view);
      }
    }

    function scrollToFile(filePath) {
      const els = document.querySelectorAll('.d2h-file-name');
      for (const el of els) {
        if (el.textContent.includes(filePath)) {
          el.closest('.d2h-file-wrapper')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          return;
        }
      }
    }

    function showCommitForm() {
      document.getElementById('commitForm').classList.add('visible');
      document.getElementById('instructForm').classList.remove('visible');
      document.getElementById('commitMsg').focus();
    }
    function hideCommitForm() {
      document.getElementById('commitForm').classList.remove('visible');
    }
    function showInstructForm() {
      document.getElementById('instructForm').classList.add('visible');
      document.getElementById('commitForm').classList.remove('visible');
      document.getElementById('instructText').focus();
    }
    function hideInstructForm() {
      document.getElementById('instructForm').classList.remove('visible');
    }

    async function submitCommit() {
      const msg = document.getElementById('commitMsg').value.trim();
      if (!msg) { showToast('Please enter a commit message', 'error'); return; }
      try {
        const res = await fetch(`/api/projects/${projectId}/approve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        if (res.ok) {
          historyCache = null;
          unpushedCache = null;
          showToast('Changes committed successfully');
          setTimeout(() => loadProject(), 1000);
        } else {
          showToast(data.error || 'Commit failed', 'error');
        }
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function rejectChanges() {
      if (!confirm('Discard all changes? This cannot be undone.')) return;
      try {
        const res = await fetch(`/api/projects/${projectId}/reject`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        if (res.ok) {
          historyCache = null; // invalidate history cache
          showToast('Changes discarded');
          setTimeout(() => loadProject(), 1000);
        } else {
          showToast(data.error || 'Reject failed', 'error');
        }
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function submitInstruct() {
      const instruction = document.getElementById('instructText').value.trim();
      if (!instruction) { showToast('Please enter an instruction', 'error'); return; }
      try {
        const res = await fetch(`/api/projects/${projectId}/instruct`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instruction })
        });
        const data = await res.json();
        if (res.ok) {
          historyCache = null; // invalidate history cache
          showToast('Instruction saved');
          document.getElementById('instructText').value = '';
          hideInstructForm();
        } else {
          showToast(data.error || 'Failed to save instruction', 'error');
        }
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // ===== Task Manager =====

    function timeAgo(iso) {
      if (!iso) return '';
      const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function timeAgoFr(iso) {
      if (!iso) return '';
      const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (diff < 60) return `il y a ${diff}s`;
      if (diff < 3600) return `il y a ${Math.floor(diff / 60)} min`;
      if (diff < 86400) return `il y a ${Math.floor(diff / 3600)}h`;
      return `il y a ${Math.floor(diff / 86400)}j`;
    }

    async function loadTasks() {
      const board = document.getElementById('kanbanBoard');
      if (!board) return;
      board.innerHTML = '<div class="loading"><div class="spinner"></div> Loading tasks...</div>';
      try {
        const res = await fetch(`/api/projects/${projectId}/tasks`);
        if (!res.ok) throw new Error('Failed to load tasks');
        tasksCache = await res.json();
        updateTasksBadge();
        renderKanban();
      } catch (err) {
        board.innerHTML = `<div class="empty-state"><div class="icon">&#10060;</div><h3>Failed to load tasks</h3><p>${escapeHtml(err.message)}</p></div>`;
      }
    }

    function updateTasksBadge() {
      const badge = document.getElementById('tasksBadge');
      if (!badge || !tasksCache) return;
      const nonDone = tasksCache.filter(t => t.status !== 'done').length;
      badge.textContent = nonDone;
      badge.style.display = nonDone > 0 ? '' : 'none';
    }

    function getFilteredTasks() {
      if (!tasksCache) return [];
      return tasksCache.filter(t => {
        if (taskFilters.status && t.status !== taskFilters.status) return false;
        if (taskFilters.priority && t.priority !== taskFilters.priority) return false;
        if (taskFilters.assignee && t.assignee !== taskFilters.assignee) return false;
        if (taskFilters.tags) {
          const q = taskFilters.tags.toLowerCase();
          if (!t.tags || !t.tags.some(tag => tag.toLowerCase().includes(q))) return false;
        }
        return true;
      });
    }

    function renderKanban() {
      const board = document.getElementById('kanbanBoard');
      if (!board) return;
      expandedTaskId = null;
      const filtered = getFilteredTasks();
      const columns = [
        { id: 'todo', label: 'Todo' },
        { id: 'in_progress', label: 'In Progress' },
        { id: 'review', label: 'Review' },
        { id: 'done', label: 'Done' },
        { id: 'blocked', label: 'Blocked' }
      ];
      board.innerHTML = columns.map(col => {
        const colTasks = filtered.filter(t => t.status === col.id);
        return `
          <div class="kanban-col">
            <div class="kanban-col-header">
              <span class="col-dot col-${col.id}"></span>
              <span>${col.label}</span>
              <span class="col-count">${colTasks.length}</span>
            </div>
            <div class="kanban-cards" id="col-${col.id}"
              ondragover="handleDragOver(event)"
              ondragleave="handleDragLeave(event)"
              ondrop="handleDrop(event, '${col.id}')">
              ${colTasks.map(t => renderTaskCard(t)).join('')}
              ${colTasks.length === 0 ? '<div class="kanban-empty">Drop here</div>' : ''}
            </div>
          </div>`;
      }).join('');
    }

    function renderTaskCard(task) {
      const age = timeAgo(task.createdAt);
      const noteCount = (task.notes || []).length;
      const tagsHtml = task.tags && task.tags.length
        ? task.tags.slice(0, 2).map(tag => `<span class="task-tag">${escapeHtml(tag)}</span>`).join('')
        : '';
      return `
        <div class="task-card"
          data-task-id="${task.id}"
          draggable="true"
          ondragstart="handleDragStart(event, '${task.id}')"
          ondragend="handleDragEnd(event)"
          onclick="toggleTaskExpand('${task.id}', event)">
          <div class="task-card-top">
            
            ${tagsHtml}
          </div>
          <div class="task-title">${escapeHtml(task.title)}</div>
          <div class="task-meta">
            <span class="task-assignee">&#128100; ${escapeHtml(task.assignee || 'unassigned')}</span>
            <span class="task-age">${age}</span>
            ${noteCount > 0 ? `<span class="task-note-count">&#128172; ${noteCount}</span>` : ''}
          </div>
        </div>`;
    }

    function toggleTaskExpand(taskId, event) {
      if (draggedTaskId) return;
      const task = tasksCache?.find(t => t.id === taskId);
      if (!task) return;
      const card = document.querySelector(`.task-card[data-task-id="${taskId}"]`);
      if (!card) return;

      const isExpanded = expandedTaskId === taskId;

      // Collapse any currently expanded card
      if (expandedTaskId) {
        const oldCard = document.querySelector(`.task-card[data-task-id="${expandedTaskId}"]`);
        if (oldCard) {
          const oldDetail = oldCard.querySelector('.task-card-detail');
          if (oldDetail) oldDetail.remove();
          oldCard.classList.remove('expanded');
        }
        expandedTaskId = null;
      }

      if (!isExpanded) {
        expandedTaskId = taskId;
        card.classList.add('expanded');

        const notes = task.notes || [];
        const notesHtml = notes.length === 0
          ? '<div class="no-comments">Aucun commentaire</div>'
          : notes.map(note => `
            <div class="task-comment-bubble">
              <div class="task-comment-header">
                <span class="task-comment-author">${escapeHtml(note.author)}</span>
                <span class="task-comment-time">${timeAgoFr(note.timestamp)}</span>
              </div>
              <div class="task-comment-text">${escapeHtml(note.text)}</div>
            </div>`).join('');

        const editBtn = task.status === 'todo'
          ? `<div class="task-detail-actions">
               <button class="btn-edit-task" onclick="event.stopPropagation(); openTaskModal('${taskId}')">&#9999;&#65039; Éditer</button>
               <button class="btn-dispatch-task" id="dispatch-${taskId}" onclick="event.stopPropagation(); dispatchTask('${taskId}')">&#129302; Traiter maintenant</button>
             </div>`
          : '';

        const detail = document.createElement('div');
        detail.className = 'task-card-detail';
        detail.innerHTML = `
          ${task.description ? `<div class="task-detail-desc">${escapeHtml(task.description)}</div>` : ''}
          <div class="task-detail-dates">
            <span>Créé : ${formatDateTime(task.createdAt)}</span>
            <span>Mis à jour : ${formatDateTime(task.updatedAt)}</span>
            ${task.completedAt ? `<span>Terminé : ${formatDateTime(task.completedAt)}</span>` : ''}
          </div>
          <div class="task-detail-notes-section">
            <div class="task-detail-notes-label">Commentaires</div>
            ${notesHtml}
          </div>
          ${editBtn}
        `;
        card.appendChild(detail);
      }
    }

    function applyTaskFilters() {
      taskFilters.status = document.getElementById('filterStatus')?.value || '';
      taskFilters.priority = document.getElementById('filterPriority')?.value || '';
      taskFilters.assignee = document.getElementById('filterAssignee')?.value || '';
      taskFilters.tags = document.getElementById('filterTags')?.value || '';
      renderKanban();
    }

    function handleDragStart(event, taskId) {
      draggedTaskId = taskId;
      event.dataTransfer.effectAllowed = 'move';
      setTimeout(() => event.currentTarget.classList.add('dragging'), 0);
    }

    function handleDragEnd(event) {
      event.currentTarget.classList.remove('dragging');
      draggedTaskId = null;
      document.querySelectorAll('.kanban-cards.drag-over').forEach(el => el.classList.remove('drag-over'));
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.dataTransfer.dropEffect = 'move';
      event.currentTarget.classList.add('drag-over');
    }

    function handleDragLeave(event) {
      if (!event.currentTarget.contains(event.relatedTarget)) {
        event.currentTarget.classList.remove('drag-over');
      }
    }

    function handleDrop(event, newStatus) {
      event.preventDefault();
      event.currentTarget.classList.remove('drag-over');
      if (!draggedTaskId) return;
      const id = draggedTaskId;
      draggedTaskId = null;
      const task = tasksCache?.find(t => t.id === id);
      if (task && task.status !== newStatus) updateTaskStatus(id, newStatus);
    }

    async function updateTaskStatus(taskId, newStatus) {
      try {
        const res = await fetch(`/api/projects/${projectId}/tasks/${taskId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
        if (res.ok) {
          const updated = await res.json();
          const idx = tasksCache.findIndex(t => t.id === taskId);
          if (idx >= 0) tasksCache[idx] = updated;
          updateTasksBadge();
          renderKanban();
        } else {
          const d = await res.json();
          showToast(d.error || 'Update failed', 'error');
        }
      } catch (err) { showToast(err.message, 'error'); }
    }

    function showNewTaskModal() {
      editingTaskId = null;
      document.getElementById('modalHeading').textContent = 'New Task';
      document.getElementById('taskTitle').value = '';
      document.getElementById('taskDesc').value = '';
      document.getElementById('taskPriority').value = 'medium';
      document.getElementById('taskStatus').value = 'todo';
      document.getElementById('taskAssignee').value = 'agent';
      document.getElementById('taskTags').value = '';
      document.getElementById('modalNotes').style.display = 'none';
      document.getElementById('deleteTaskBtn').style.display = 'none';
      document.getElementById('saveTaskBtn').textContent = 'Create Task';
      document.getElementById('taskModal').style.display = 'flex';
      setTimeout(() => document.getElementById('taskTitle').focus(), 50);
    }

    function openTaskModal(taskId) {
      const task = tasksCache?.find(t => t.id === taskId);
      if (!task) return;
      editingTaskId = taskId;
      document.getElementById('modalHeading').textContent = 'Edit Task';
      document.getElementById('taskTitle').value = task.title;
      document.getElementById('taskDesc').value = task.description || '';
      document.getElementById('taskPriority').value = task.priority;
      document.getElementById('taskStatus').value = task.status;
      document.getElementById('taskAssignee').value = task.assignee || '';
      document.getElementById('taskTags').value = (task.tags || []).join(', ');
      document.getElementById('modalNotes').style.display = '';
      renderNotesTimeline(task.notes || []);
      document.getElementById('noteText').value = '';
      document.getElementById('deleteTaskBtn').style.display = '';
      document.getElementById('saveTaskBtn').textContent = 'Save Changes';
      document.getElementById('taskModal').style.display = 'flex';
      setTimeout(() => document.getElementById('taskTitle').focus(), 50);
    }

    function closeTaskModal() {
      document.getElementById('taskModal').style.display = 'none';
      editingTaskId = null;
    }

    function renderNotesTimeline(notes) {
      const timeline = document.getElementById('notesTimeline');
      if (!notes || !notes.length) {
        timeline.innerHTML = '<div class="notes-empty">No notes yet.</div>';
        return;
      }
      timeline.innerHTML = notes.map(note => `
        <div class="note-item">
          <div class="note-meta">
            <span class="note-author">${escapeHtml(note.author)}</span>
            <span class="note-time">${formatDateTime(note.timestamp)}</span>
          </div>
          <div class="note-text">${escapeHtml(note.text)}</div>
        </div>`).join('');
      timeline.scrollTop = timeline.scrollHeight;
    }

    async function saveTask() {
      const title = document.getElementById('taskTitle').value.trim();
      if (!title) { showToast('Title is required', 'error'); return; }
      const taskData = {
        title,
        description: document.getElementById('taskDesc').value.trim(),
        priority: document.getElementById('taskPriority').value,
        status: document.getElementById('taskStatus').value,
        assignee: document.getElementById('taskAssignee').value.trim() || 'agent',
        tags: document.getElementById('taskTags').value.split(',').map(t => t.trim()).filter(Boolean)
      };
      try {
        const url = editingTaskId
          ? `/api/projects/${projectId}/tasks/${editingTaskId}`
          : `/api/projects/${projectId}/tasks`;
        const method = editingTaskId ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(taskData)
        });
        const data = await res.json();
        if (res.ok) {
          if (editingTaskId) {
            const idx = tasksCache.findIndex(t => t.id === editingTaskId);
            if (idx >= 0) tasksCache[idx] = data;
          } else {
            tasksCache.push(data);
          }
          updateTasksBadge();
          renderKanban();
          closeTaskModal();
          showToast(editingTaskId ? 'Task updated' : 'Task created');
        } else {
          showToast(data.error || 'Failed to save task', 'error');
        }
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function deleteTask() {
      if (!editingTaskId || !confirm('Delete this task? This cannot be undone.')) return;
      try {
        const res = await fetch(`/api/projects/${projectId}/tasks/${editingTaskId}`, { method: 'DELETE' });
        if (res.ok) {
          tasksCache = tasksCache.filter(t => t.id !== editingTaskId);
          updateTasksBadge();
          renderKanban();
          closeTaskModal();
          showToast('Task deleted');
        } else {
          const d = await res.json();
          showToast(d.error || 'Delete failed', 'error');
        }
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function submitNote() {
      if (!editingTaskId) return;
      const author = document.getElementById('noteAuthor').value.trim() || 'admin';
      const text = document.getElementById('noteText').value.trim();
      if (!text) { showToast('Note text required', 'error'); return; }
      try {
        const res = await fetch(`/api/projects/${projectId}/tasks/${editingTaskId}/notes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ author, text })
        });
        const data = await res.json();
        if (res.ok) {
          const task = tasksCache?.find(t => t.id === editingTaskId);
          if (task) {
            if (!task.notes) task.notes = [];
            task.notes.push(data);
            renderNotesTimeline(task.notes);
            renderKanban();
          }
          document.getElementById('noteText').value = '';
          showToast('Note added');
        } else {
          showToast(data.error || 'Failed to add note', 'error');
        }
      } catch (err) { showToast(err.message, 'error'); }
    }

    // Close modal on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('taskModal')?.style.display === 'flex') {
        closeTaskModal();
      }
    });

    async function loadProject() {
      if (!projectId) {
        document.getElementById('content').innerHTML = '<div class="empty-state"><h3>No project specified</h3></div>';
        return;
      }
      try {
        const res = await fetch(`/api/projects/${projectId}`);
        if (res.status === 401) { window.location.href = '/login.html'; return; }
        if (!res.ok) {
          const d = await res.json();
          document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">&#10060;</div><h3>Error</h3><p>${escapeHtml(d.error)}</p></div>`;
          return;
        }
        const data = await res.json();
        renderPage(data);
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">&#10060;</div><h3>Failed to load</h3><p>${escapeHtml(err.message)}</p></div>`;
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    async function dispatchTask(taskId) {
      const btn = document.getElementById(`dispatch-${taskId}`);
      if (!btn) return;
      const original = btn.innerHTML;
      btn.disabled = true;
      btn.textContent = 'En cours...';
      try {
        const res = await fetch(`/api/projects/${projectId}/tasks/${taskId}/dispatch`, { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          const task = tasksCache?.find(t => t.id === taskId);
          if (task) { task.status = 'in_progress'; task.updatedAt = new Date().toISOString(); }
          updateTasksBadge();
          renderKanban();
          showToast('Tâche envoyée à l\'agent');
        } else {
          btn.innerHTML = original;
          btn.disabled = false;
          showToast(data.error || 'Erreur lors de l\'envoi', 'error');
        }
      } catch (err) {
        btn.innerHTML = original;
        btn.disabled = false;
        showToast(err.message, 'error');
      }
    }

    // Auth check + load
    fetch('/api/session').then(r => r.json()).then(d => {
      if (!d.authenticated) window.location.href = '/login.html';
      else loadProject();
    });
  </script>
</body>
</html>
