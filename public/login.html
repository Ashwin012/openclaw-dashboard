<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Dashboard — Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Dev Dashboard</h1>
      <p class="subtitle">Git diff review for Claude Code changes</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" autofocus required>
        </div>
        <button type="submit" class="btn-primary">Sign in</button>
        <div class="error-msg" id="errorMsg">Invalid password. Please try again.</div>
      </form>

      <div style="margin-top:16px; text-align:center; color:var(--text-muted,#888); font-size:13px;">ou</div>

      <button id="passkeyBtn" type="button" class="btn-primary" style="margin-top:12px; width:100%; background:transparent; border:1px solid var(--border,#444); color:var(--text,#cdd6f4); display:flex; align-items:center; justify-content:center; gap:8px;">
        🔑 Se connecter avec une clé d'accès
      </button>
      <div class="error-msg" id="passkeyError" style="display:none;"></div>
    </div>
  </div>

  <script>
    // Redirect if already authenticated
    fetch('/api/session')
      .then(r => r.json())
      .then(d => { if (d.authenticated) window.location.href = '/home.html'; });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          window.location.href = '/home.html';
        } else {
          errorMsg.textContent = data.error || 'Invalid password';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
  <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
  <script>
    document.getElementById('passkeyBtn').addEventListener('click', async () => {
      const errorEl = document.getElementById('passkeyError');
      errorEl.style.display = 'none';
      try {
        const optRes = await fetch('/api/passkeys/auth-options', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
        if (!optRes.ok) throw new Error('Impossible d\'obtenir les options');
        const options = await optRes.json();
        const authResp = await SimpleWebAuthnBrowser.startAuthentication({ optionsJSON: options });
        const verRes = await fetch('/api/passkeys/auth-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(authResp),
        });
        const data = await verRes.json();
        if (verRes.ok && data.ok) {
          window.location.href = '/home.html';
        } else {
          errorEl.textContent = data.error || 'Authentification échouée';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        if (err.name !== 'NotAllowedError') {
          errorEl.textContent = err.message || 'Erreur lors de l\'authentification';
          errorEl.style.display = 'block';
        }
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
