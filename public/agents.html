<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agents — Dev Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <style>

    .agents-main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    .agents-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .agents-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .agents-stats {
      display: flex;
      gap: 12px;
      font-size: 13px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .agents-stats .stat-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .agents-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Project Card */
    .agent-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .agent-card-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border-muted, var(--border));
    }

    .agent-card-header a {
      text-decoration: none;
    }

    .agent-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      flex: 1;
    }

    .agent-name:hover { text-decoration: underline; }

    .agent-status-label {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 12px;
    }
    .agent-status-label.active { background: rgba(63, 185, 80, 0.15); color: var(--green); border: 1px solid rgba(63, 185, 80, 0.3); }
    .agent-status-label.idle   { background: rgba(210, 153, 34, 0.15); color: var(--yellow); border: 1px solid rgba(210, 153, 34, 0.3); }
    .agent-status-label.down   { background: rgba(139, 148, 158, 0.15); color: var(--text-muted); border: 1px solid rgba(139, 148, 158, 0.3); }

    .agent-card-body {
      padding: 14px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .instance-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .instance-col-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .instance-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .instance-dot.active { background: var(--green); box-shadow: 0 0 6px rgba(63, 185, 80, 0.4); }
    .instance-dot.idle   { background: var(--yellow); box-shadow: 0 0 6px rgba(210, 153, 34, 0.4); }
    .instance-dot.down   { background: var(--text-muted); }

    .instance-activity {
      font-size: 11px;
      color: var(--text-muted);
      padding-left: 16px;
    }

    .agent-card-footer {
      padding: 10px 20px;
      border-top: 1px solid var(--border-muted, var(--border));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .agent-current-task {
      font-size: 12px;
      padding: 8px 20px;
      background: rgba(63, 185, 80, 0.06);
      border-top: 1px solid var(--border-muted, var(--border));
      color: var(--text-muted);
    }
    .agent-current-task strong { color: var(--green); }

    .agent-pending-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      background: rgba(210, 153, 34, 0.18);
      color: var(--yellow);
      border: 1px solid rgba(210, 153, 34, 0.4);
      animation: pulse-yellow 1.5s ease-in-out infinite;
    }

    @keyframes pulse-yellow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }

    .review-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(210, 153, 34, 0.12);
      color: var(--yellow);
      border: 1px solid rgba(210, 153, 34, 0.3);
      text-decoration: none;
    }
    .review-badge:hover { background: rgba(210, 153, 34, 0.22); }

    .worker-offline-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: rgba(139, 148, 158, 0.1);
      border: 1px solid rgba(139, 148, 158, 0.3);
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .worker-offline-banner strong { color: var(--text); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* OpenClaw Agents Section */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-top: 32px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .section-count {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 2px 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .oc-agent-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .oc-agent-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      min-width: 180px;
    }

    .oc-agent-model {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 8px;
      background: var(--accent)22;
      color: var(--accent);
      border: 1px solid var(--accent)44;
    }

    .oc-agent-thinking {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 8px;
      background: var(--purple)22;
      color: var(--purple);
      border: 1px solid var(--purple)44;
    }

    .oc-agent-projects {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .oc-agent-projects a {
      color: var(--accent);
      text-decoration: none;
    }
    .oc-agent-projects a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .agent-card-body { grid-template-columns: 1fr; }
      .oc-agent-card { flex-direction: column; align-items: flex-start; }
      .oc-agent-projects { margin-left: 0; }
    }
  </style>
</head>
<body>
  <script src="/js/navbar.js"></script>
<main class="agents-main">
    <div class="agents-header">
      <div>
        <div class="agents-title">Agents</div>
        <div class="agents-stats" id="agentsStats"></div>
      </div>
    </div>

    <div class="section-title">Agents VPS (Claude Code) <span class="section-count" id="vpsCount">0</span></div>
    <div id="workerBanner"></div>
    <div class="agents-grid" id="agentsGrid">
      <div class="empty-state">Chargement...</div>
    </div>

    <div class="section-title">Agents OpenClaw <span class="section-count" id="ocCount">0</span></div>
    <div class="agents-grid" id="ocAgentsGrid">
      <div class="empty-state">Chargement...</div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    let projects = [];
    let openclawAgents = [];
    let workerStatus = null;

    function timeAgo(isoDate) {
      if (!isoDate) return '';
      const diff = (Date.now() - new Date(isoDate).getTime()) / 1000;
      if (diff < 60) return 'il y a moins d\'une minute';
      if (diff < 3600) return `il y a ${Math.floor(diff / 60)}min`;
      if (diff < 86400) return `il y a ${Math.floor(diff / 3600)}h`;
      const days = Math.floor(diff / 86400);
      if (days < 7) return `il y a ${days}j`;
      try {
        const d = new Date(isoDate);
        return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
      } catch { return `il y a ${days}j`; }
    }

    function fmtTimestamp(isoDate) {
      if (!isoDate) return '';
      try {
        const d = new Date(isoDate);
        return d.toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch { return isoDate; }
    }

    function getOverallStatus(p) {
      if (p.codeStatus === 'active' || p.planStatus === 'active') return 'active';
      if (p.codeStatus === 'idle' || p.planStatus === 'idle') return 'idle';
      return 'down';
    }

    function renderStats() {
      const total = projects.length;
      const active = projects.filter(p => getOverallStatus(p) === 'active').length;
      const idle = projects.filter(p => getOverallStatus(p) === 'idle').length;
      let slotsPill = '';
      if (workerStatus) {
        const slotsColor = workerStatus.count >= (workerStatus.maxConcurrency || Infinity) ? 'var(--red)' : workerStatus.count > 0 ? 'var(--yellow)' : 'var(--green)';
        const slotsLabel = workerStatus.maxConcurrency ? `${workerStatus.count}/${workerStatus.maxConcurrency} slots` : `${workerStatus.count} actif(s)`;
        slotsPill = `<span class="stat-pill" title="Worker: ${workerStatus.running ? 'en ligne' : 'offline'}"><span style="color:${slotsColor};font-weight:600">${slotsLabel}</span></span>`;
      } else {
        slotsPill = `<span class="stat-pill"><span style="color:var(--text-muted)">worker offline</span></span>`;
      }
      document.getElementById('agentsStats').innerHTML =
        `<span class="stat-pill"><span style="color:var(--text)">${total}</span> projets</span>` +
        `<span class="stat-pill"><span style="color:var(--green)">${active}</span> actifs</span>` +
        `<span class="stat-pill"><span style="color:var(--yellow)">${idle}</span> idle</span>` +
        `<span class="stat-pill"><span style="color:var(--purple)">${openclawAgents.length}</span> agents</span>` +
        slotsPill;
      document.getElementById('vpsCount').textContent = total;
      document.getElementById('ocCount').textContent = openclawAgents.length;
    }

    function renderWorkerBanner() {
      const banner = document.getElementById('workerBanner');
      if (!workerStatus) {
        banner.innerHTML = `<div class="worker-offline-banner">
          <span style="font-size:16px">&#9888;</span>
          <span><strong>Worker hors ligne</strong> — Impossible de joindre le worker (port 8091). Les statuts affichés reflètent l'inaccessibilité du worker.</span>
        </div>`;
      } else {
        banner.innerHTML = '';
      }
    }

    function buildActivityLine(p) {
      // Pick most recent activity source
      const candidates = [];
      if (p.lastActivity && p.lastActivity.timestamp)
        candidates.push({ kind: 'notification', ts: new Date(p.lastActivity.timestamp).getTime(), d: p.lastActivity });
      if (p.projectLastTask && p.projectLastTask.timestamp)
        candidates.push({ kind: 'task', ts: new Date(p.projectLastTask.timestamp).getTime(), d: p.projectLastTask });
      if (p.gitLastCommit && p.gitLastCommit.timestamp)
        candidates.push({ kind: 'git', ts: new Date(p.gitLastCommit.timestamp).getTime(), d: p.gitLastCommit });
      if (p.lastKnownActivity && p.lastKnownActivity.timestamp)
        candidates.push({ kind: 'inprogress', ts: new Date(p.lastKnownActivity.timestamp).getTime(), d: p.lastKnownActivity });
      if (!candidates.length) return '<span style="font-style:italic">Aucune activité</span>';

      const ACTIONABLE = new Set(['review', 'validating']);
      const actionable = candidates.filter(c =>
        (c.kind === 'notification' || c.kind === 'task') && ACTIONABLE.has(c.d.status)
      );
      const best = actionable.length > 0
        ? actionable.reduce((a, b) => a.ts >= b.ts ? a : b)
        : candidates.reduce((a, b) => a.ts >= b.ts ? a : b);

      if (best.kind === 'inprogress') {
        const lk = best.d;
        return `<span style="color:var(--accent)">en cours</span> ${escapeHtml(lk.taskTitle || '?')} <span style="font-size:10px" title="${fmtTimestamp(lk.timestamp)}">${timeAgo(lk.timestamp)}</span>`;
      } else if (best.kind === 'notification' || best.kind === 'task') {
        const item = best.d;
        const statusColor = item.status === 'done' || item.status === 'approved' ? 'var(--green)'
          : item.status === 'rejected' || item.status === 'failed' ? 'var(--red)'
          : item.status === 'review' || item.status === 'validating' ? 'var(--yellow)'
          : 'var(--text-muted)';
        const commitEl = item.commitSha ? ` <span style="font-family:monospace;font-size:10px">${escapeHtml(item.commitSha)}</span>` : '';
        return `<span style="color:${statusColor};font-weight:600">${escapeHtml(item.status)}</span> ${escapeHtml(item.taskTitle || '?')}${commitEl} <span style="font-size:10px" title="${fmtTimestamp(item.timestamp)}">${timeAgo(item.timestamp)}</span>`;
      } else {
        const gc = best.d;
        return `<span style="font-weight:600">git</span> <span style="font-family:monospace;font-size:10px">${escapeHtml(gc.hash)}</span> ${escapeHtml(gc.message)} <span style="font-size:10px" title="${fmtTimestamp(gc.timestamp)}">${timeAgo(gc.timestamp)}</span>`;
      }
    }

    function renderProjects() {
      const grid = document.getElementById('agentsGrid');
      renderWorkerBanner();
      if (!projects.length) {
        grid.innerHTML = '<div class="empty-state">Aucun projet configuré</div>';
        renderStats();
        return;
      }

      // Sort: active > has reviews > idle > down
      const sorted = [...projects].sort((a, b) => {
        const aPending = a.currentTask?.pendingQuestion ? 1 : 0;
        const bPending = b.currentTask?.pendingQuestion ? 1 : 0;
        if (aPending !== bPending) return bPending - aPending;
        const statusOrder = { active: 0, idle: 1, down: 2 };
        const sa = statusOrder[getOverallStatus(a)] ?? 3;
        const sb = statusOrder[getOverallStatus(b)] ?? 3;
        if (sa !== sb) return sa - sb;
        const ra = a.pendingReviewCount || 0;
        const rb = b.pendingReviewCount || 0;
        if (ra !== rb) return rb - ra;
        return (a.name || '').localeCompare(b.name || '');
      });

      grid.innerHTML = sorted.map(p => {
        const overall = getOverallStatus(p);
        const overallLabel = overall === 'active' ? 'Active' : overall === 'idle' ? 'Idle' : 'Down';
        const hasPending = !!p.currentTask?.pendingQuestion;

        const taskRow = p.currentTask
          ? (() => {
              const t = p.currentTask;
              const dur = t.startedAt ? ` <span style="color:var(--text-muted);font-size:11px" title="${fmtTimestamp(t.startedAt)}">depuis ${timeAgo(t.startedAt)}</span>` : '';
              const engineBadge = t.engine ? ` <span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44">${escapeHtml(t.engine)}</span>` : '';
              const pending = t.pendingQuestion
                ? `<div style="margin-top:4px;padding:4px 8px;background:rgba(210,153,34,0.1);border:1px solid rgba(210,153,34,0.3);border-radius:4px;color:var(--yellow);font-size:11px">En attente: ${escapeHtml(typeof t.pendingQuestion === 'object' ? (t.pendingQuestion.question || JSON.stringify(t.pendingQuestion)) : t.pendingQuestion)}</div>`
                : '';
              return `<div class="agent-current-task"><strong>Tâche active:</strong> ${escapeHtml(t.title || t.id)}${dur}${engineBadge}${pending}</div>`;
            })()
          : '';

        const activityLine = !p.currentTask ? buildActivityLine(p) : '';

        const reviewBadge = (p.pendingReviewCount || 0) > 0
          ? `<a href="/project.html?id=${encodeURIComponent(p.id)}" class="review-badge" title="${p.pendingReviewCount} tâche(s) en attente de review">${p.pendingReviewCount} en review</a>`
          : '';

        return `<div class="agent-card">
          <div class="agent-card-header">
            <a href="/project.html?id=${encodeURIComponent(p.id)}" class="agent-name">${escapeHtml(p.name)}</a>
            ${hasPending ? '<span class="agent-pending-badge">Réponse requise</span>' : ''}
            ${reviewBadge}
            <span class="agent-status-label ${overall}">${escapeHtml(overallLabel)}</span>
          </div>
          <div class="agent-card-body">
            <div class="instance-col">
              <div class="instance-col-header">
                <div class="instance-dot ${p.planStatus}"></div>
                Plan
              </div>
              <div class="instance-activity">—</div>
            </div>
            <div class="instance-col">
              <div class="instance-col-header">
                <div class="instance-dot ${p.codeStatus}"></div>
                Code
              </div>
              <div class="instance-activity">${p.currentTask ? escapeHtml(p.currentTask.title || '...') : '—'}</div>
            </div>
          </div>
          ${taskRow}
          ${!p.currentTask ? `<div class="agent-card-footer">${activityLine}</div>` : ''}
        </div>`;
      }).join('');
      renderStats();
    }

    function renderOpenclawAgents() {
      const grid = document.getElementById('ocAgentsGrid');
      if (!openclawAgents.length) {
        grid.innerHTML = '<div class="empty-state">Aucun agent configuré</div>';
        return;
      }
      grid.innerHTML = openclawAgents.map(a => {
        const modelShort = (a.model || '').replace('claude-', '').replace('-4-6', ' 4.6');
        const projectLinks = (a.linkedProjects || []).map(p =>
          `<a href="/project.html?id=${encodeURIComponent(p.id)}">${escapeHtml(p.name)}</a>`
        ).join(', ') || '<span style="font-style:italic">non assigné</span>';
        return `<div class="oc-agent-card">
          <span class="oc-agent-name">${escapeHtml(a.name)}</span>
          ${a.model ? `<span class="oc-agent-model">${escapeHtml(modelShort)}</span>` : ''}
          ${a.thinking ? `<span class="oc-agent-thinking">thinking: ${escapeHtml(a.thinking)}</span>` : ''}
          <span class="oc-agent-projects">${projectLinks}</span>
        </div>`;
      }).join('');
    }

    async function loadProjects() {
      try {
        const res = await fetch('/api/agents');
        if (!res.ok) throw new Error('Erreur chargement');
        const data = await res.json();
        projects = Array.isArray(data.projects) ? data.projects : [];
        openclawAgents = Array.isArray(data.openclawAgents) ? data.openclawAgents : [];
        workerStatus = data.workerStatus || null;
        renderProjects();
        renderOpenclawAgents();
      } catch (err) {
        document.getElementById('agentsGrid').innerHTML = `<div class="empty-state" style="color:var(--red)">Erreur: ${escapeHtml(err.message)}</div>`;
      }
    }

    initCommon(() => {
      loadProjects();
      createSmartInterval(loadProjects, 15000);
    });
  </script>
</body>
</html>
