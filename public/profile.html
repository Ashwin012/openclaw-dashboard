<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <style>

    .profile-main { max-width: 480px; margin: 40px auto; padding: 0 20px; }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .form-row { margin-bottom: 16px; }
    .form-row label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-row input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      box-sizing: border-box;
    }
    .form-row input:focus { outline: none; border-color: var(--accent); }

    .btn-save {
      width: 100%;
      padding: 10px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-save:hover { background: #74a8f8; }
    .btn-save:disabled { opacity: 0.6; cursor: default; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; pointer-events: auto; }
    .toast.success { background: #1a4731; color: #3fb950; border: 1px solid #3fb950; }
    .toast.error { background: #3d1c1c; color: #f85149; border: 1px solid #f85149; }

    @media (max-width: 768px) {
    }

    .passkey-list { list-style: none; padding: 0; margin: 0 0 16px 0; }
    .passkey-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .passkey-item:last-child { border-bottom: none; }
    .passkey-info { font-size: 13px; color: var(--text-muted); }
    .passkey-info strong { display: block; color: var(--text); font-size: 14px; margin-bottom: 2px; }
    .btn-delete-passkey {
      padding: 4px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--red, #f38ba8);
      background: transparent;
      color: var(--red, #f38ba8);
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-delete-passkey:hover { background: rgba(243,139,168,0.1); }
    .passkey-empty { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
  </style>
</head>
<body>
  <script src="/js/navbar.js"></script>
<main class="profile-main">
    <div class="section-title" style="margin-top:0;">Clés d'accès</div>
    <div class="card" style="margin-bottom:32px;">
      <ul class="passkey-list" id="passkeyList"></ul>
      <div class="passkey-empty" id="passkeyEmpty" style="display:none;">Aucune clé d'accès enregistrée.</div>
      <button id="addPasskeyBtn" type="button" class="btn-save" style="margin-top:0;">+ Ajouter une clé d'accès</button>
    </div>

    <div class="section-title">Changer le mot de passe</div>
    <div class="card">
      <form id="passwordForm">
        <div class="form-row">
          <label>Mot de passe actuel</label>
          <input type="password" id="currentPassword" autocomplete="current-password" required>
        </div>
        <div class="form-row">
          <label>Nouveau mot de passe</label>
          <input type="password" id="newPassword" autocomplete="new-password" required>
        </div>
        <div class="form-row">
          <label>Confirmer</label>
          <input type="password" id="confirmPassword" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn-save" id="saveBtn">Enregistrer</button>
      </form>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/common.js"></script>
  <script>
    initCommon(() => { loadPasskeys(); });

    // Password form
    document.getElementById('passwordForm').addEventListener('submit', async e => {
      e.preventDefault();
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        showToast('Les mots de passe ne correspondent pas', 'error');
        return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Enregistrement...';

      try {
        const res = await fetch('/api/profile/password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword, newPassword })
        });
        const data = await res.json();
        if (res.ok) {
          showToast('Mot de passe mis à jour', 'success');
          document.getElementById('passwordForm').reset();
        } else {
          showToast(data.error || 'Erreur', 'error');
        }
      } catch {
        showToast('Erreur réseau', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enregistrer';
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
  <script>
    async function loadPasskeys() {
      try {
        const res = await fetch('/api/passkeys');
        if (!res.ok) return;
        const data = await res.json();
        const list = document.getElementById('passkeyList');
        const empty = document.getElementById('passkeyEmpty');
        list.innerHTML = '';
        if (!data.credentials || data.credentials.length === 0) {
          empty.style.display = 'block';
          return;
        }
        empty.style.display = 'none';
        for (const cred of data.credentials) {
          const date = new Date(cred.addedAt).toLocaleDateString('fr-FR');
          const type = cred.deviceType === 'multiDevice' ? 'Multi-appareil' : 'Appareil unique';
          const li = document.createElement('li');
          li.className = 'passkey-item';
          li.dataset.id = cred.id;
          li.innerHTML = `
            <div class="passkey-info">
              <strong>🔑 ${type}${cred.backedUp ? ' · synchronisée' : ''}</strong>
              Ajoutée le ${date}
            </div>
            <button class="btn-delete-passkey" data-id="${cred.id}">Supprimer</button>
          `;
          list.appendChild(li);
        }
      } catch {}
    }

    document.getElementById('passkeyList').addEventListener('click', async (e) => {
      const btn = e.target.closest('.btn-delete-passkey');
      if (!btn) return;
      const id = btn.dataset.id;
      btn.disabled = true;
      try {
        const res = await fetch(`/api/passkeys/${encodeURIComponent(id)}`, { method: 'DELETE' });
        if (res.ok) {
          showToast('Clé supprimée', 'success');
          loadPasskeys();
        } else {
          const d = await res.json();
          showToast(d.error || 'Erreur', 'error');
        }
      } catch {
        showToast('Erreur réseau', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('addPasskeyBtn').addEventListener('click', async () => {
      const btn = document.getElementById('addPasskeyBtn');
      btn.disabled = true;
      btn.textContent = 'En attente...';
      try {
        const optRes = await fetch('/api/passkeys/register-options', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
        if (!optRes.ok) throw new Error('Impossible d\'obtenir les options');
        const options = await optRes.json();
        const regResp = await SimpleWebAuthnBrowser.startRegistration({ optionsJSON: options });
        const verRes = await fetch('/api/passkeys/register-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(regResp),
        });
        const data = await verRes.json();
        if (verRes.ok && data.ok) {
          showToast('Clé d\'accès ajoutée', 'success');
          loadPasskeys();
        } else {
          showToast(data.error || 'Erreur', 'error');
        }
      } catch (err) {
        if (err.name !== 'NotAllowedError') {
          showToast(err.message || 'Erreur lors de l\'enregistrement', 'error');
        }
      } finally {
        btn.disabled = false;
        btn.textContent = '+ Ajouter une clé d\'accès';
      }
    });

  </script>
</body>
</html>
